name: Debug SSH VPS

on:
  workflow_dispatch:
  push:
    branches: [ dev ]
    paths: [ '.github/workflows/debug-ssh.yml' ]

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - name: Runner egress IP
      run: curl -s https://ifconfig.me; echo

    - name: Scan host key of VPS
      run: |
        ssh-keyscan -T 10 -t ed25519 ${{ secrets.STAGING_HOST }} || echo "keyscan failed"

    - name: Try SSH with deploy key
      run: |
        mkdir -p ~/.ssh
        printf '%s' "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        wc -c ~/.ssh/deploy_key
        head -1 ~/.ssh/deploy_key
        tail -1 ~/.ssh/deploy_key
        ssh -vvv -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=15 \
          -i ~/.ssh/deploy_key ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} "echo CONNECTED OK" 2>&1 | tail -40
