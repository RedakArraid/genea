name: GeneaIA CI/CD

# Flux : dev (tests) -> staging (tests + build + deploy staging) -> main (tests + build + deploy prod)
# VPS Contabo : Traefik route geneamap.com / api.geneamap.com (prod)
#               et staging.geneamap.com / api-staging.geneamap.com (staging).
# Le compose déployé est celui du repo (docker-compose.staging.yml / docker-compose.prod.yml),
# copié par scp. Les secrets applicatifs (R2, SMTP, DB...) vivent dans le .env du serveur.

on:
  push:
    branches: [ main, staging, dev ]
  pull_request:
    branches: [ main, staging ]
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  REPO_NAME: redakarraid/geneaia

jobs:
  test:
    runs-on: ubuntu-latest
    name: Tests et qualité

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: geneaia_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: |
          backend/package-lock.json
          frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd backend && npm ci
        cd ../frontend && npm ci

    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate

    - name: Run database migrations
      run: |
        cd backend
        npx prisma migrate deploy
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geneaia_test

    - name: Lint Backend
      run: |
        cd backend
        npm run lint || echo "Linting warnings detected"

    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint || echo "Linting warnings detected"

    - name: Backend Tests
      run: |
        cd backend
        npm test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/geneaia_test
        JWT_SECRET: test-secret-key
        NODE_ENV: test

    - name: Frontend Tests (layout engine)
      run: |
        cd frontend
        npm test

    - name: Build Frontend
      run: |
        cd frontend
        npm run build
      env:
        VITE_API_URL: http://localhost:3001/api

  build:
    needs: test
    runs-on: ubuntu-latest
    name: Build images Docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/dev')

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-backend:${{ github.ref_name }}
          ${{ github.ref_name == 'main' && format('{0}/{1}-backend:latest', env.REGISTRY, env.REPO_NAME) || '' }}
        cache-from: type=gha,scope=${{ github.ref_name }}-backend
        cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-backend

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.REPO_NAME }}-frontend:${{ github.ref_name }}
          ${{ github.ref_name == 'main' && format('{0}/{1}-frontend:latest', env.REGISTRY, env.REPO_NAME) || '' }}
        cache-from: type=gha,scope=${{ github.ref_name }}-frontend
        cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-frontend
        build-args: |
          VITE_API_URL=${{
            github.ref_name == 'main' && 'https://api.geneamap.com/api' ||
            github.ref_name == 'staging' && 'https://api-staging.geneamap.com/api' ||
            'http://localhost:3002/api'
          }}

  deploy-staging:
    needs: [test, build]
    runs-on: ubuntu-latest
    name: Deploy staging
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.geneamap.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy compose file to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        source: docker-compose.staging.yml
        target: ${{ secrets.STAGING_PATH }}

    - name: Deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USER }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        port: 22
        command_timeout: 10m
        script: |
          set -e
          cd ${{ secrets.STAGING_PATH }}

          if [ ! -f .env ]; then
            echo "ERREUR: .env manquant dans ${{ secrets.STAGING_PATH }} — créer le fichier (voir .env.production.example, variables STAGING_* + R2_*)"
            exit 1
          fi

          echo "Pull des images..."
          docker compose -f docker-compose.staging.yml --env-file .env pull

          echo "Démarrage des services..."
          docker compose -f docker-compose.staging.yml --env-file .env up -d --remove-orphans

          echo "Attente de PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec geneaia-db-staging pg_isready -U geneaia_staging -d geneaia_staging >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Migrations Prisma..."
          docker exec geneaia-backend-staging npx prisma migrate deploy

          echo "Health checks..."
          sleep 10
          docker exec geneaia-backend-staging curl -sf http://localhost:3001/api/health >/dev/null \
            && echo "Backend: OK" || { echo "Backend: FAILED"; exit 1; }

          docker image prune -f || true
          echo "Déploiement staging terminé — https://staging.geneamap.com"

    - name: Health check via Traefik
      run: |
        sleep 10
        curl -sf https://api-staging.geneamap.com/api/health && echo "API publique: OK" || echo "API publique pas encore joignable (DNS/Traefik ?)"

  deploy-production:
    needs: [test, build]
    runs-on: ubuntu-latest
    name: Deploy production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://geneamap.com

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Copy compose file to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        port: 22
        source: docker-compose.prod.yml
        target: ${{ secrets.PROD_PATH }}

    - name: Deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        port: 22
        command_timeout: 15m
        script: |
          set -e
          cd ${{ secrets.PROD_PATH }}
          TIMESTAMP=$(date '+%Y%m%d_%H%M%S')

          if [ ! -f .env ]; then
            echo "ERREUR: .env manquant dans ${{ secrets.PROD_PATH }} — créer le fichier (voir .env.production.example)"
            exit 1
          fi

          if docker exec geneaia-db-prod pg_isready -U geneaia_prod -d geneaia_production >/dev/null 2>&1; then
            echo "Sauvegarde de la base..."
            mkdir -p backups
            docker exec geneaia-db-prod pg_dump -U geneaia_prod -d geneaia_production > backups/backup_${TIMESTAMP}.sql
            echo "Backup: backups/backup_${TIMESTAMP}.sql"
          fi

          echo "Pull des images..."
          docker compose -f docker-compose.prod.yml --env-file .env pull

          echo "Démarrage des services..."
          docker compose -f docker-compose.prod.yml --env-file .env up -d --remove-orphans

          echo "Attente de PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec geneaia-db-prod pg_isready -U geneaia_prod -d geneaia_production >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          echo "Migrations Prisma..."
          docker exec geneaia-backend-prod npx prisma migrate deploy

          echo "Health checks..."
          sleep 10
          docker exec geneaia-backend-prod curl -sf http://localhost:3001/api/health >/dev/null \
            && echo "Backend: OK" || { echo "Backend: FAILED"; exit 1; }

          docker image prune -f || true
          echo "Déploiement production terminé — https://geneamap.com"
          echo "Backup: backups/backup_${TIMESTAMP}.sql"

    - name: Health check via Traefik
      run: |
        sleep 10
        curl -sf https://api.geneamap.com/api/health && echo "API publique: OK" || echo "API publique pas encore joignable (DNS/Traefik ?)"
        curl -sf https://geneamap.com >/dev/null && echo "Frontend: OK" || echo "Frontend pas encore joignable"
