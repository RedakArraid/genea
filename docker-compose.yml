version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: geneaia-db-local-v2
    environment:
      POSTGRES_DB: geneaia_local
      POSTGRES_USER: geneaia_user
      POSTGRES_PASSWORD: geneaia_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geneaia_user -d geneaia_local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: geneaia-backend-local-v2
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://geneaia_user:geneaia_password@postgres:5432/geneaia_local?schema=public
      - JWT_SECRET=dev-secret-key-for-local-development-only
      - CORS_ORIGIN=http://localhost:5173
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=geneaia_minio
      - S3_SECRET_KEY=geneaia_minio_password
      - S3_BUCKET=geneaia
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=http://localhost:9000/geneaia
      - API_PUBLIC_URL=http://localhost:3001
      - FRONTEND_URL=http://localhost:5173
      - PAYSTACK_SECRET_KEY=
      - PAYSTACK_PUBLIC_KEY=
      - CINETPAY_API_KEY=
      - CINETPAY_SITE_ID=
      - STORAGE_PHOTO_PREFIX=photos
      - STORAGE_DOCUMENT_PREFIX=documents
      - STORAGE_PHOTO_MAX_MB=5
      - STORAGE_DOCUMENT_MAX_MB=20
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    command: ["sh", "docker-entrypoint.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # MinIO — stockage objet (photos, fichiers)
  minio:
    image: minio/minio:latest
    container_name: geneaia-minio-local-v2
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: geneaia_minio
      MINIO_ROOT_PASSWORD: geneaia_minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geneaia-frontend-local-v2
    environment:
      - VITE_API_URL=http://localhost:3001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  default:
    name: geneaia-local
