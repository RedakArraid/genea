version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: geneaia-db-prod
    environment:
      POSTGRES_DB: geneaia_production
      POSTGRES_USER: geneaia_prod
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD:-prod456password}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geneaia_prod -d geneaia_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/redakarraid/geneaia-backend:latest
    container_name: geneaia-backend-prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://geneaia_prod:${PROD_DB_PASSWORD:-prod456password}@postgres:5432/geneaia_production?schema=public
      - JWT_SECRET=${PROD_JWT_SECRET:-prod_jwt_secret_abc123xyz}
      - CORS_ORIGIN=http://168.231.86.179:8080
      - PORT=3001
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-geneaia_minio}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-geneaia_minio_password}
      - S3_BUCKET=geneaia
      - S3_REGION=us-east-1
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-http://168.231.86.179:9000/geneaia}
      - API_PUBLIC_URL=http://168.231.86.179:8080
      - STORAGE_USE_PROXY=true
      - STORAGE_PHOTO_PREFIX=photos
      - STORAGE_DOCUMENT_PREFIX=documents
      - STORAGE_PHOTO_MAX_MB=5
      - STORAGE_DOCUMENT_MAX_MB=20
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: geneaia-minio-prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-geneaia_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-geneaia_minio_password}
    volumes:
      - minio_prod_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    image: ghcr.io/redakarraid/geneaia-frontend:latest
    container_name: geneaia-frontend-prod
    environment:
      - VITE_API_URL=http://168.231.86.179:8080/api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: geneaia-nginx-prod
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Pour HTTPS plus tard
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_prod_data:
    driver: local
  minio_prod_data:
    driver: local

networks:
  default:
    name: geneaia-production
