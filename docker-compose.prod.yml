# Production — VPS Contabo (Traefik + Let's Encrypt)
# Domaines : geneamap.com (frontend) / api.geneamap.com (backend)
# Stockage : Cloudflare R2 (bucket geneamap-prod) — voir docs/CLOUDFLARE_R2.md
# Déployé dans /root/geneaia/ avec un fichier .env (voir .env.production.example)

services:
  postgres:
    image: postgres:15-alpine
    container_name: geneaia-db-prod
    environment:
      POSTGRES_DB: geneaia_production
      POSTGRES_USER: geneaia_prod
      POSTGRES_PASSWORD: ${PROD_DB_PASSWORD:?PROD_DB_PASSWORD requis}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geneaia_prod -d geneaia_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/redakarraid/geneaia-backend:latest
    container_name: geneaia-backend-prod
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://geneaia_prod:${PROD_DB_PASSWORD}@postgres:5432/geneaia_production?schema=public
      - JWT_SECRET=${PROD_JWT_SECRET:?PROD_JWT_SECRET requis}
      - PORT=3001
      - CORS_ORIGIN=https://geneamap.com
      - FRONTEND_URL=https://geneamap.com
      - API_PUBLIC_URL=https://api.geneamap.com
      # ─── Cloudflare R2 ───
      - S3_ENDPOINT=${R2_ENDPOINT:?R2_ENDPOINT requis}
      - S3_ACCESS_KEY=${R2_ACCESS_KEY:?R2_ACCESS_KEY requis}
      - S3_SECRET_KEY=${R2_SECRET_KEY:?R2_SECRET_KEY requis}
      - S3_BUCKET=geneamap-prod
      - S3_REGION=auto
      - STORAGE_AUTO_INIT=false
      - STORAGE_USE_PROXY=true
      - STORAGE_PHOTO_PREFIX=photos
      - STORAGE_DOCUMENT_PREFIX=documents
      - STORAGE_PHOTO_MAX_MB=5
      - STORAGE_DOCUMENT_MAX_MB=20
      # ─── Paiements ───
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY:-}
      # ─── SMTP / OTP ───
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-GeneaIA <noreply@geneamap.com>}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@geneamap.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PHONE=${ADMIN_PHONE:-+2250700000010}
      - OTP_EXPIRES_MINUTES=${OTP_EXPIRES_MINUTES:-10}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - traefik_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_network
      - traefik.http.routers.geneaia-api.rule=Host(`api.geneamap.com`)
      - traefik.http.routers.geneaia-api.entrypoints=websecure
      - traefik.http.routers.geneaia-api.tls.certresolver=mytlschallenge
      - traefik.http.services.geneaia-api.loadbalancer.server.port=3001

  frontend:
    image: ghcr.io/redakarraid/geneaia-frontend:latest
    container_name: geneaia-frontend-prod
    networks:
      - traefik_network
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_network
      - traefik.http.routers.geneaia-front.rule=Host(`geneamap.com`) || Host(`www.geneamap.com`)
      - traefik.http.routers.geneaia-front.entrypoints=websecure
      - traefik.http.routers.geneaia-front.tls.certresolver=mytlschallenge
      - traefik.http.services.geneaia-front.loadbalancer.server.port=80

volumes:
  postgres_prod_data:
    driver: local

networks:
  internal:
    name: geneaia-prod-internal
  traefik_network:
    external: true
