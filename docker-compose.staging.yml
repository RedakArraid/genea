# Staging, VPS Contabo (Traefik + Let's Encrypt)
# Domaines : staging.geneamap.com (frontend) / api-staging.geneamap.com (backend)
# Stockage : Cloudflare R2 (bucket geneamap-staging), voir docs/CLOUDFLARE_R2.md
# Déployé dans /root/geneamap-staging/ avec un fichier .env

services:
  postgres:
    image: postgres:15-alpine
    container_name: geneamap-db-staging
    environment:
      # Identifiants DB inchangés sur le VPS (volume PostgreSQL existant)
      POSTGRES_DB: geneaia_staging
      POSTGRES_USER: geneaia_staging
      POSTGRES_PASSWORD: ${STAGING_DB_PASSWORD:?STAGING_DB_PASSWORD requis}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geneaia_staging -d geneaia_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/redakarraid/geneamap-backend:staging
    container_name: geneamap-backend-staging
    environment:
      - NODE_ENV=staging
      - DATABASE_URL=postgresql://geneaia_staging:${STAGING_DB_PASSWORD}@postgres:5432/geneaia_staging?schema=public
      - JWT_SECRET=${STAGING_JWT_SECRET:?STAGING_JWT_SECRET requis}
      - PORT=3001
      - CORS_ORIGIN=https://staging.geneamap.com,https://www.staging.geneamap.com
      - FRONTEND_URL=https://staging.geneamap.com
      - API_PUBLIC_URL=https://api-staging.geneamap.com
      # ─── Cloudflare R2 ───
      - S3_ENDPOINT=${R2_ENDPOINT:?R2_ENDPOINT requis}
      - S3_ACCESS_KEY=${R2_ACCESS_KEY:?R2_ACCESS_KEY requis}
      - S3_SECRET_KEY=${R2_SECRET_KEY:?R2_SECRET_KEY requis}
      - S3_BUCKET=geneamap-staging
      - S3_REGION=auto
      - STORAGE_AUTO_INIT=false
      - STORAGE_USE_PROXY=true
      - STORAGE_PHOTO_PREFIX=photos
      - STORAGE_DOCUMENT_PREFIX=documents
      - STORAGE_PHOTO_MAX_MB=5
      - STORAGE_DOCUMENT_MAX_MB=20
      # ─── Paiements (clés de test en staging) ───
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY:-}
      - PAYSTACK_PUBLIC_KEY=${PAYSTACK_PUBLIC_KEY:-}
      # ─── SMTP / OTP ───
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-geneamap Staging <noreply@geneamap.com>}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@geneamap.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PHONE=${ADMIN_PHONE:-+2250700000010}
      - OTP_EXPIRES_MINUTES=${OTP_EXPIRES_MINUTES:-10}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - traefik_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_network
      - traefik.http.routers.geneamap-api-staging.rule=Host(`api-staging.geneamap.com`)
      - traefik.http.routers.geneamap-api-staging.entrypoints=websecure
      - traefik.http.routers.geneamap-api-staging.tls.certresolver=mytlschallenge
      - traefik.http.services.geneamap-api-staging.loadbalancer.server.port=3001
      - traefik.http.services.geneamap-api-staging.loadbalancer.healthcheck.path=/api/health
      - traefik.http.services.geneamap-api-staging.loadbalancer.healthcheck.interval=5s
      - traefik.http.services.geneamap-api-staging.loadbalancer.healthcheck.timeout=3s

  frontend:
    image: ghcr.io/redakarraid/geneamap-frontend:staging
    container_name: geneamap-frontend-staging
    networks:
      - traefik_network
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik_network
      - traefik.http.routers.geneamap-front-staging.rule=Host(`staging.geneamap.com`) || Host(`www.staging.geneamap.com`)
      - traefik.http.routers.geneamap-front-staging.entrypoints=websecure
      - traefik.http.routers.geneamap-front-staging.tls.certresolver=mytlschallenge
      - traefik.http.services.geneamap-front-staging.loadbalancer.server.port=80

volumes:
  postgres_staging_data:
    driver: local

networks:
  internal:
    name: geneamap-staging-internal
  traefik_network:
    external: true
